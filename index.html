<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tool chọn số xổ số</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    select, button { padding: 10px; margin: 10px; }
    #result { font-size: 22px; margin-top: 20px; }
  </style>
</head>
<body>

<h2>🎯 Tool chọn số Vietlott + XSMB</h2>

<select id="game">
  <option value="mega">Mega 6/45</option>
  <option value="power">Power 6/55</option>
  <option value="lotto535">Lotto 5/35</option>
  <option value="keno">Keno</option>
  <option value="max3d">Max 3D</option>
  <option value="max4d">Max 4D</option>
  <option value="xsmb2">XSMB 2 số (đề)</option>
  <option value="xsmb3">XSMB 3 càng</option>
</select>

<select id="mode">
  <option value="random">Random</option>
  <option value="history">Theo cầu (giả lập)</option>
</select>

<br>

<button onclick="generate()">🎲 Tạo số</button>

<div id="result"></div>

<script>
// ===== random =====
function randomUnique(count, max) {
  const set = new Set();
  while (set.size < count) {
    set.add(Math.floor(Math.random() * max) + 1);
  }
  return Array.from(set).sort((a,b)=>a-b);
}

// ===== fake "cầu đẹp" =====
const hot2 = [01, 11, 22, 33, 44, 55, 66, 77, 88, 99];
const hot3 = [123, 234, 345, 456, 567, 678, 789];

// ===== main =====
function generate(){
  const game = document.getElementById("game").value;
  const mode = document.getElementById("mode").value;

  let result = "";

  // ===== VIETLOTT =====
  if(game === "mega"){
    result = randomUnique(6,45);

  } else if(game === "power"){
    result = randomUnique(6,55);

  } else if(game === "lotto535"){
    result = randomUnique(5,35);

  } else if(game === "keno"){
    const count = Math.floor(Math.random()*10)+1;
    result = randomUnique(count,80);

  } else if(game === "max3d"){
    result = Math.floor(Math.random()*1000).toString().padStart(3,'0');

  } else if(game === "max4d"){
    result = Math.floor(Math.random()*10000).toString().padStart(4,'0');

  // ===== XSMB =====
  } else if(game === "xsmb2"){
    if(mode === "random"){
      result = Math.floor(Math.random()*100).toString().padStart(2,'0');
    } else {
      result = hot2[Math.floor(Math.random()*hot2.length)];
    }

  } else if(game === "xsmb3"){
    if(mode === "random"){
      result = Math.floor(Math.random()*1000).toString().padStart(3,'0');
    } else {
      result = hot3[Math.floor(Math.random()*hot3.length)];
    }
  }

  // format hiển thị
  if(Array.isArray(result)){
    result = result.map(n => n.toString().padStart(2,'0')).join(', ');
  }

  document.getElementById("result").innerHTML = "👉 " + result;
}
</script>

</body>
</html>
