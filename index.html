<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool xổ số nâng cao</title>

<style>
  body { font-family: Arial; padding: 15px; background:#f5f5f5; }
  .container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
  }
  input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
  }
  button { background:#007bff; color:white; border:none; }
  #result { margin-top:20px; font-size:18px; }
</style>
</head>

<body>
<div class="container">

<h2>🎯 Tool random + biến đổi</h2>

<input id="userNumber" placeholder="Nhập số của bạn">

<select id="game">
  <option value="lotto535">Lotto 5/35</option>
  <option value="mega">Mega 6/45</option>
</select>

<button onclick="generate()">🎲 Tạo số</button>

<div id="result"></div>

</div>

<script>

// ===== seed =====
function createSeed(input){
  const d = new Date();
  const str = input + d.getFullYear() + (d.getMonth()+1) + d.getDate();
  let seed = 0;
  for(let i=0;i<str.length;i++){
    seed += str.charCodeAt(i);
  }
  return seed;
}

// ===== random =====
function seededRandom(seed){
  return function(){
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }
}

// ===== unique =====
function generateUnique(rand, count, max){
  const set = new Set();
  while(set.size < count){
    set.add(Math.floor(rand()*max)+1);
  }
  return Array.from(set);
}

// ===== CÁCH 1 (trừ linh hoạt) =====
function method1(nums){
  return nums.map(n=>{
    let sub = Math.floor(n/10) + 1; // giảm theo hàng chục
    let val = n - sub;
    if(val < 0) val = n; // tránh âm
    return val;
  });
}

// ===== CÁCH 2 (biến đổi chữ số) =====
function method2(nums){
  return nums.map(n=>{
    let str = n.toString().padStart(2,'0');
    let rev = parseInt(str.split('').reverse().join(''));

    if(rev <= 45 && rev > 0){
      return rev;
    } else {
      return Math.max(0, n - 1);
    }
  });
}

// ===== lọc + chuẩn hóa =====
function normalize(arr){
  return [...new Set(arr)]
    .filter(n => n >= 0 && n <= 45)
    .sort((a,b)=>a-b)
    .map(n => n.toString().padStart(2,'0'));
}

// ===== main =====
function generate(){
  const input = document.getElementById("userNumber").value || "default";
  const game = document.getElementById("game").value;

  const rand = seededRandom(createSeed(input));

  let base = [];

  if(game === "lotto535"){
    base = generateUnique(rand, 5, 35);
  } else {
    base = generateUnique(rand, 6, 45);
  }

  const m1 = method1(base);
  const m2 = method2(base);

  const final = normalize([...m1, ...m2]);

  document.getElementById("result").innerHTML = `
    🔹 Gốc: ${base.map(n=>n.toString().padStart(2,'0')).join(', ')}<br>
    🔸 Cách 1: ${normalize(m1).join(', ')}<br>
    🔸 Cách 2: ${normalize(m2).join(', ')}<br>
    🔥 Kết quả cuối: ${final.join(', ')}
  `;
}

</script>

</body>
</html>
