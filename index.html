<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<!-- QUAN TRỌNG cho mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool xổ số mobile</title>

<style>
  body {
    font-family: Arial;
    padding: 15px;
    margin: 0;
    background: #f5f5f5;
  }

  .container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }

  h2 {
    font-size: 20px;
  }

  input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    background: #007bff;
    color: white;
    border: none;
    font-weight: bold;
  }

  button:active {
    background: #0056b3;
  }

  #result {
    font-size: 20px;
    margin-top: 20px;
    word-wrap: break-word;
  }

  small {
    color: #666;
  }

  @media (max-width: 400px) {
    h2 {
      font-size: 18px;
    }
    #result {
      font-size: 18px;
    }
  }
</style>
</head>

<body>

<div class="container">

<h2>🎯 Tool xổ số</h2>

<input id="userNumber" placeholder="Nhập số của bạn" />

<select id="game">
  <option value="lotto535">Lotto 5/35 (+ đặc biệt)</option>
  <option value="mega">Mega 6/45</option>
  <option value="power">Power 6/55</option>
  <option value="xsmb2">XSMB 2 số</option>
</select>

<button onclick="generate()">🎲 Tạo số</button>

<div id="result"></div>

</div>

<script>
// ===== seed =====
function createSeed(input){
  const d = new Date();
  const str = input + d.getFullYear() + (d.getMonth()+1) + d.getDate();
  let seed = 0;
  for(let i=0;i<str.length;i++){
    seed += str.charCodeAt(i);
  }
  return seed;
}

// ===== random seed =====
function seededRandom(seed){
  return function(){
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }
}

// ===== unique =====
function generateUnique(rand, count, max){
  const set = new Set();
  while(set.size < count){
    set.add(Math.floor(rand()*max)+1);
  }
  return Array.from(set).sort((a,b)=>a-b);
}

// ===== special =====
function generateSpecial(rand, arr, max){
  let n;
  do{
    n = Math.floor(rand()*max)+1;
  }while(arr.includes(n));
  return n;
}

// ===== main =====
function generate(){
  const input = document.getElementById("userNumber").value || "default";
  const game = document.getElementById("game").value;

  const rand = seededRandom(createSeed(input));

  let result = "";

  if(game === "lotto535"){
    const main = generateUnique(rand, 5, 35);
    const sp = generateSpecial(rand, main, 35);
    result = main.map(n=>n.toString().padStart(2,'0')).join(', ') + " ⭐ " + sp.toString().padStart(2,'0');

  } else if(game === "mega"){
    result = generateUnique(rand, 6, 45).map(n=>n.toString().padStart(2,'0')).join(', ');

  } else if(game === "power"){
    const main = generateUnique(rand, 6, 55);
    const sp = generateSpecial(rand, main, 55);
    result = main.map(n=>n.toString().padStart(2,'0')).join(', ') + " ⭐ " + sp.toString().padStart(2,'0');

  } else if(game === "xsmb2"){
    result = Math.floor(rand()*100).toString().padStart(2,'0');
  }

  document.getElementById("result").innerHTML = "👉 " + result;
}
</script>

</body>
</html>
