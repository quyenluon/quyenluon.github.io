<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tool xổ số Pro</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    select, button { padding: 10px; margin: 10px; }
    #result { font-size: 22px; margin-top: 20px; }
    #history { margin-top: 20px; text-align: left; max-width: 400px; margin-inline: auto; }
    .item { padding: 5px; border-bottom: 1px solid #ccc; }
  </style>
</head>
<body>

<h2>🎯 Tool xổ số (có lưu lịch sử)</h2>

<select id="game">
  <option value="mega">Mega 6/45</option>
  <option value="power">Power 6/55</option>
  <option value="lotto535">Lotto 5/35</option>
  <option value="keno">Keno</option>
  <option value="xsmb2">XSMB 2 số</option>
</select>

<button onclick="generate()">🎲 Tạo số</button>
<button onclick="clearHistory()">🗑 Xóa lịch sử</button>

<div id="result"></div>

<h3>📜 Lịch sử</h3>
<div id="history"></div>

<script>
// ===== load history =====
function loadHistory(){
  const data = JSON.parse(localStorage.getItem("lottery_history")) || [];
  const div = document.getElementById("history");
  div.innerHTML = "";

  data.reverse().forEach(item=>{
    div.innerHTML += `<div class="item">${item}</div>`;
  });
}

// ===== save =====
function saveHistory(text){
  let data = JSON.parse(localStorage.getItem("lottery_history")) || [];
  data.push(text);

  // giới hạn 50 dòng
  if(data.length > 50) data.shift();

  localStorage.setItem("lottery_history", JSON.stringify(data));
}

// ===== random =====
function randomUnique(count, max) {
  const set = new Set();
  while (set.size < count) {
    set.add(Math.floor(Math.random() * max) + 1);
  }
  return Array.from(set).sort((a,b)=>a-b);
}

// ===== generate =====
function generate(){
  const game = document.getElementById("game").value;
  let result = "";

  if(game === "mega"){
    result = randomUnique(6,45);

  } else if(game === "power"){
    result = randomUnique(6,55);

  } else if(game === "lotto535"){
    result = randomUnique(5,35);

  } else if(game === "keno"){
    result = randomUnique(Math.floor(Math.random()*10)+1,80);

  } else if(game === "xsmb2"){
    result = Math.floor(Math.random()*100).toString().padStart(2,'0');
  }

  if(Array.isArray(result)){
    result = result.map(n => n.toString().padStart(2,'0')).join(', ');
  }

  const text = `${new Date().toLocaleString()} | ${game.toUpperCase()} → ${result}`;

  document.getElementById("result").innerHTML = "👉 " + result;

  saveHistory(text);
  loadHistory();
}

// ===== clear =====
function clearHistory(){
  localStorage.removeItem("lottery_history");
  loadHistory();
}

// load khi mở web
loadHistory();
</script>

</body>
</html>
