<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Crypto Random 64 Số</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#111;
        color:white;
        padding:20px;
    }

    h2{
        margin-bottom:10px;
    }

    input{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        font-size:18px;
        margin-bottom:10px;
        box-sizing:border-box;
    }

    .info{
        color:#aaa;
        margin-bottom:15px;
        line-height:1.7;
    }

    .exclude-list{
        background:#222;
        padding:10px;
        border-radius:10px;
        min-height:60px;
        margin-bottom:20px;
    }

    .tag{
        display:inline-flex;
        align-items:center;
        background:#e17055;
        padding:8px 12px;
        border-radius:10px;
        margin:5px;
        font-size:18px;
    }

    .remove{
        margin-left:10px;
        cursor:pointer;
        font-weight:bold;
    }

    button{
        padding:12px 20px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
        margin-right:10px;
    }

    .generate{
        background:#00b894;
        color:white;
    }

    .copy{
        background:#0984e3;
        color:white;
    }

    #result{
        margin-top:20px;
        background:#222;
        padding:15px;
        border-radius:10px;
        line-height:2;
        word-wrap:break-word;
        font-size:20px;
    }
</style>
</head>
<body>

<h2>Danh sách số cấm</h2>

<div class="info">
    • Tối đa 20 số<br>
    • Số mới hiển thị trước<br>
    • Có thể xóa từng số<br>
    • Dùng Crypto Random mạnh hơn Math.random()
</div>

<input
    type="text"
    id="numberInput"
    placeholder="Nhập số 00-99 rồi nhấn Enter"
/>

<div class="exclude-list" id="excludeList"></div>

<button class="generate" onclick="generateNumbers()">
    Tạo 64 số
</button>

<button class="copy" onclick="copyResult()">
    Copy danh sách
</button>

<div id="result"></div>

<script>

let excludeNumbers = [];

// Format 2 chữ số
function formatNumber(num){
    return num.toString().padStart(2, '0');
}

// Crypto random
function secureRandom(max){

    const array = new Uint32Array(1);

    crypto.getRandomValues(array);

    return array[0] % max;
}

// Hiển thị danh sách cấm
function renderExcludeList(){

    const container = document.getElementById("excludeList");

    container.innerHTML = "";

    [...excludeNumbers].reverse().forEach(num => {

        container.innerHTML += `
            <span class="tag">
                ${num}
                <span class="remove" onclick="removeNumber('${num}')">
                    ×
                </span>
            </span>
        `;

    });
}

// Xóa số cấm
function removeNumber(num){

    excludeNumbers = excludeNumbers.filter(item => item !== num);

    renderExcludeList();
}

// Nhập số
document.getElementById("numberInput").addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        let value = this.value.trim();

        if(value === "" || isNaN(value)){
            this.value = "";
            return;
        }

        let num = parseInt(value);

        if(num < 0 || num > 99){

            alert("Chỉ nhập số từ 00 đến 99");

            this.value = "";

            return;
        }

        value = formatNumber(num);

        // Không cho trùng
        if(excludeNumbers.includes(value)){

            this.value = "";

            return;
        }

        // Quá 20 số -> xóa số cũ nhất
        if(excludeNumbers.length >= 20){
            excludeNumbers.shift();
        }

        excludeNumbers.push(value);

        renderExcludeList();

        this.value = "";
    }

});

// Tạo số random
function generateNumbers(){

    let allNumbers = [];

    // Tạo danh sách 00-99
    for(let i = 0; i <= 99; i++){

        const num = formatNumber(i);

        // Bỏ số cấm
        if(!excludeNumbers.includes(num)){
            allNumbers.push(num);
        }
    }

    // Fisher-Yates + Crypto Random
    for(let i = allNumbers.length - 1; i > 0; i--){

        const j = secureRandom(i + 1);

        [allNumbers[i], allNumbers[j]] =
        [allNumbers[j], allNumbers[i]];
    }

    // Lấy 64 số
    let result = allNumbers.slice(0, 64);

    // Sắp xếp tăng dần
    result.sort((a, b) => Number(a) - Number(b));

    document.getElementById("result").innerText =
        result.join(", ");
}

// Copy
function copyResult(){

    const text = document.getElementById("result").innerText;

    if(!text){

        alert("Chưa có danh sách!");

        return;
    }

    navigator.clipboard.writeText(text);

    alert("Đã copy danh sách!");
}

</script>

</body>
</html>
