<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool xổ số nâng cao</title>

<style>
  body { font-family: Arial; padding: 15px; background:#f5f5f5; }
  .container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
  }
  input, select, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
  }
  button { background:#007bff; color:white; border:none; }
  #result { margin-top:20px; font-size:20px; }
  label { display:block; margin-top:10px; }
</style>
</head>

<body>
<div class="container">

<h2>🎯 Tool random theo ngày</h2>

<input id="userNumber" placeholder="Nhập số của bạn">

<label>
  <input type="checkbox" id="useToday" checked>
  Dùng ngày hôm nay
</label>

<input type="date" id="customDate">

<select id="game">
  <option value="lotto535">Lotto 5/35 (+ đặc biệt)</option>
  <option value="mega">Mega 6/45</option>
  <option value="power">Power 6/55</option>
  <option value="xsmb2">XSMB 2 số</option>
</select>

<button onclick="generate()">🎲 Tạo số</button>

<div id="result"></div>

</div>

<script>
// ===== lấy ngày =====
function getDateString(){
  const useToday = document.getElementById("useToday").checked;
  const custom = document.getElementById("customDate").value;

  if(useToday || !custom){
    const d = new Date();
    return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
  }
  return custom;
}

// ===== seed =====
function createSeed(input){
  const dateStr = getDateString();
  const str = input + dateStr;

  let seed = 0;
  for(let i=0;i<str.length;i++){
    seed += str.charCodeAt(i);
  }
  return seed;
}

// ===== random seed =====
function seededRandom(seed){
  return function(){
    seed = (seed * 9301 + 49297) % 233280;
    return seed / 233280;
  }
}

// ===== unique =====
function generateUnique(rand, count, max){
  const set = new Set();
  while(set.size < count){
    set.add(Math.floor(rand()*max)+1);
  }
  return Array.from(set).sort((a,b)=>a-b);
}

// ===== special =====
function generateSpecial(rand, arr, max){
  let n;
  do{
    n = Math.floor(rand()*max)+1;
  }while(arr.includes(n));
  return n;
}

// ===== main =====
function generate(){
  const input = document.getElementById("userNumber").value || "default";
  const game = document.getElementById("game").value;

  const seed = createSeed(input);
  const rand = seededRandom(seed);

  let result = "";

  if(game === "lotto535"){
    const main = generateUnique(rand, 5, 35);
    const sp = generateSpecial(rand, main, 35);
    result = main.map(n=>n.toString().padStart(2,'0')).join(', ') + " ⭐ " + sp.toString().padStart(2,'0');

  } else if(game === "mega"){
    result = generateUnique(rand, 6, 45).map(n=>n.toString().padStart(2,'0')).join(', ');

  } else if(game === "power"){
    const main = generateUnique(rand, 6, 55);
    const sp = generateSpecial(rand, main, 55);
    result = main.map(n=>n.toString().padStart(2,'0')).join(', ') + " ⭐ " + sp.toString().padStart(2,'0');

  } else if(game === "xsmb2"){
    result = Math.floor(rand()*100).toString().padStart(2,'0');
  }

  document.getElementById("result").innerHTML =
    "👉 " + result + "<br><small>Ngày: " + getDateString() + " | Seed: " + seed + "</small>";
}
</script>

</body>
</html>
