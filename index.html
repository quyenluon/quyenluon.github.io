<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tạo 64 số ngẫu nhiên</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#111;
        color:white;
        padding:20px;
    }

    h2{
        margin-bottom:10px;
    }

    input{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        font-size:18px;
        margin-bottom:10px;
        box-sizing:border-box;
    }

    .exclude-list{
        background:#222;
        padding:10px;
        border-radius:10px;
        min-height:60px;
        line-height:2;
        margin-bottom:15px;
    }

    .tag{
        display:inline-block;
        background:#e17055;
        padding:6px 10px;
        border-radius:8px;
        margin:4px;
        font-size:18px;
    }

    button{
        padding:12px 20px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
        margin-right:10px;
    }

    .generate{
        background:#00b894;
        color:white;
    }

    .copy{
        background:#0984e3;
        color:white;
    }

    #result{
        margin-top:20px;
        background:#222;
        padding:15px;
        border-radius:10px;
        line-height:2;
        word-wrap:break-word;
        font-size:20px;
    }

    .info{
        color:#aaa;
        margin-bottom:10px;
    }
</style>
</head>
<body>

<h2>Danh sách số không xuất hiện</h2>

<div class="info">
    Nhập tối đa 15 số. Khi vượt quá 15 số, số cũ nhất sẽ tự bị xóa.
</div>

<input 
    type="text" 
    id="numberInput" 
    placeholder="Nhập số từ 00 đến 99 rồi nhấn Enter"
/>

<div class="exclude-list" id="excludeList"></div>

<button class="generate" onclick="generateNumbers()">
    Tạo 64 số
</button>

<button class="copy" onclick="copyResult()">
    Copy danh sách
</button>

<div id="result"></div>

<script>

let excludeNumbers = [];

// Format 2 chữ số
function formatNumber(num){
    return num.toString().padStart(2, '0');
}

// Hiển thị danh sách loại trừ
function renderExcludeList(){

    const container = document.getElementById("excludeList");

    container.innerHTML = "";

    excludeNumbers.forEach(num => {

        container.innerHTML += `
            <span class="tag">${num}</span>
        `;

    });
}

// Nhập số bằng Enter
document.getElementById("numberInput").addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        let value = this.value.trim();

        // Chỉ cho nhập số
        if(value === "" || isNaN(value)){
            this.value = "";
            return;
        }

        let num = parseInt(value);

        // Giới hạn 00-99
        if(num < 0 || num > 99){
            alert("Chỉ nhập số từ 00 đến 99");
            this.value = "";
            return;
        }

        value = formatNumber(num);

        // Không thêm nếu đã tồn tại
        if(excludeNumbers.includes(value)){
            this.value = "";
            return;
        }

        // Nếu vượt quá 15 số → xóa số cũ nhất
        if(excludeNumbers.length >= 15){
            excludeNumbers.shift();
        }

        excludeNumbers.push(value);

        renderExcludeList();

        this.value = "";
    }

});

// Tạo 64 số random
function generateNumbers(){

    let allNumbers = [];

    for(let i = 0; i <= 99; i++){

        const num = formatNumber(i);

        if(!excludeNumbers.includes(num)){
            allNumbers.push(num);
        }
    }

    // Shuffle
    for(let i = allNumbers.length - 1; i > 0; i--){

        const j = Math.floor(Math.random() * (i + 1));

        [allNumbers[i], allNumbers[j]] = [allNumbers[j], allNumbers[i]];
    }

    // Lấy 64 số
    const result = allNumbers.slice(0, 64);

    document.getElementById("result").innerText = result.join(", ");
}

// Copy
function copyResult(){

    const text = document.getElementById("result").innerText;

    if(!text){
        alert("Chưa có danh sách!");
        return;
    }

    navigator.clipboard.writeText(text);

    alert("Đã copy danh sách!");
}

</script>

</body>
</html>
