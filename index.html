<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo 64 Số Ngẫu Nhiên</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h2 { color: #333; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; margin-bottom: 20px; }
        button:hover { background-color: #0056b3; }
        table { border-collapse: collapse; width: 90%; max-width: 800px; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; font-weight: bold; }
        .last-two { color: #d9534f; font-weight: bold; font-size: 1.1em; }
        .full-number { color: #555; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h2>Công cụ tạo 64 số ngẫu nhiên (5 chữ số)</h2>
    <button onclick="generateNumbers()">Tạo dãy số mới</button>

    <table>
        <thead>
            <tr>
                <th>STT</th>
                <th>Số tự nhiên (5 chữ số)</th>
                <th>2 số đuôi</th>
            </tr>
        </thead>
        <tbody id="numberTable">
            <!-- Dữ liệu sẽ hiển thị ở đây -->
        </tbody>
    </table>

    <script>
        function generateNumbers() {
            const tbody = document.getElementById('numberTable');
            tbody.innerHTML = ''; // Xóa dữ liệu cũ

            for (let i = 1; i <= 64; i++) {
                // Tạo số ngẫu nhiên từ 10000 đến 99999
                let fullNumber = Math.floor(Math.random() * 90000) + 10000;
                let lastTwo = fullNumber.toString().slice(-2);

                let row = `<tr>
                    <td><b>${i}</b></td>
                    <td class="full-number">${fullNumber}</td>
                    <td class="last-two">${lastTwo}</td>
                </tr>`;
                
                tbody.innerHTML += row;
            }
        }

        // Tự động tạo lần đầu khi load trang
        window.onload = generateNumbers;
    </script>

</body>
</html>
